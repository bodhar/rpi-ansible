### Create user accounts
- name: Create users
  user:
    name: "{{ item.name }}"
    comment: "{{ item.comment }}"
    group: "{{ item.group }}"
    groups: "{{ item.groups }}"
    uid: "{{ item.uid }}"
    state: present
    shell: /bin/bash
  with_items: "{{ create_users }}"
  tags: ['users']

- name: Install ssh pubkeys for new users
  authorized_key:
    user: "{{ item.name }}"
    key: "{{ item.pubkey }}"
    state: present
  with_items: "{{ create_users }}"
  when: item.pubkey is defined
  tags: ['users', 'ssh-keys']

