---
# Uninstall Raspbian bloat
- name: Remove raspbian bloat
  apt:
    name: "{{ raspbian_bloat_packages }}"
    state: absent
    autoremove: true
  tags: ['software', 'cleanup']

# Install required software
- name: Update apt cache
  apt:
    update_cache: true
    cache_valid_time: 3600
  tags: ['software']

- name: Install basic software environment
  apt:
    name: "{{ essential_packages }}"
    state: present
  tags: ['software']

- name: Install additional software
  apt:
    name: "{{ myconfig.extra_software }}"
    state: present
  when: "'extra_software' in myconfig and myconfig.extra_software is defined"
  tags: ['software']
